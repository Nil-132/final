<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Project02</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 mx-4">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-blue-600">Project02</h1>
      <p class="text-gray-600 mt-2">Learn Like Physics Wallah</p>
    </div>
    <h2 class="text-2xl font-semibold text-center mb-6">Welcome Back</h2>

    <!-- Error Message Box -->
    <div id="error-msg" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-2xl text-sm mb-6"></div>

    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
        <input type="email" id="email" required
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600"
               placeholder="admin@project02.com or student@project02.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input type="password" id="password" required
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600"
               placeholder="Enter your password">
      </div>
      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition-all text-lg">
        Login
      </button>
    </form>

    <div class="flex justify-between text-sm mt-4">
      <label class="flex items-center">
        <input type="checkbox" class="w-4 h-4">
        <span class="ml-2 text-gray-600">Remember me</span>
      </label>
      <a href="/forgot-password.html" class="text-blue-600 hover:underline">Forgot Password?</a>
    </div>

    <div class="mt-10 p-5 bg-gray-50 rounded-2xl text-sm">
      <p class="font-medium text-gray-700 mb-3">Demo Accounts:</p>
      <p><strong>Admin:</strong> admin@project02.com<br>Password: Admin@12345</p>
      <p class="mt-2"><strong>Student:</strong> student@project02.com<br>Password: Student@12345</p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-msg');

      // Clear previous error
      errorDiv.classList.add('hidden');

      if (!email || !password) {
        errorDiv.textContent = "Please enter email and password";
        errorDiv.classList.remove('hidden');
        return;
      }

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {
          // Successful login → directly go to dashboard (no alert)
          window.location.href = '/dashboard.html';
        } else {
          // Show standard error message
          errorDiv.textContent = "Invalid email or password";
          errorDiv.classList.remove('hidden');
        }
      } catch (err) {
        errorDiv.textContent = "Server error. Please try again later.";
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
