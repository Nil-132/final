<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Project02</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
      font-family: system-ui, -apple-system, sans-serif;
    }
    .card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
    }
    .live-dot {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white border-b shadow-sm">
    <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">P</div>
        <h1 class="text-2xl font-bold text-gray-800">Project02</h1>
      </div>
      <div class="flex items-center gap-6">
        <span id="welcome-name" class="text-gray-600 font-medium"></span>
        <button onclick="logout()"
                class="flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-2xl text-sm font-medium">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-8 py-12">
    <h2 class="text-4xl font-bold text-gray-800 text-center mb-4">Welcome Back!</h2>
    <p class="text-gray-600 text-center text-lg mb-12">Choose what you want to study today</p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
      <!-- Live Classes Card -->
      <div onclick="goToLive()" class="card bg-gradient-to-br from-red-500 to-rose-600 text-white rounded-3xl p-10 cursor-pointer">
        <div class="flex items-center justify-between mb-8">
          <div class="text-6xl">📡</div>
          <span class="inline-flex items-center gap-2 bg-white/20 text-white text-sm font-medium px-5 py-2 rounded-2xl">
            <span class="w-3 h-3 bg-white rounded-full live-dot"></span> LIVE
          </span>
        </div>
        <h3 class="text-3xl font-bold mb-3">Live Classes</h3>
        <p class="text-white/80 text-lg">Join ongoing live sessions with teachers</p>
        <div class="mt-10 text-sm font-medium flex items-center gap-2">
          Go to Live <span class="text-2xl">→</span>
        </div>
      </div>

      <!-- Recorded Lectures Card -->
      <div onclick="goToLibrary()" class="card bg-gradient-to-br from-blue-600 to-indigo-600 text-white rounded-3xl p-10 cursor-pointer">
        <div class="flex items-center justify-between mb-8">
          <div class="text-6xl">📚</div>
        </div>
        <h3 class="text-3xl font-bold mb-3">Recorded Lectures</h3>
        <p class="text-white/80 text-lg">Access all previous classes & notes anytime</p>
        <div class="mt-10 text-sm font-medium flex items-center gap-2">
          Open Library <span class="text-2xl">→</span>
        </div>
      </div>
    </div>

    <!-- Planner Button -->
    <div class="mt-12 text-center">
      <button onclick="openPlanner()"
              class="bg-white hover:bg-gray-50 border-2 border-gray-300 text-gray-700 px-10 py-5 rounded-3xl text-lg font-semibold flex items-center gap-3 mx-auto">
        <i class="fa-solid fa-calendar-days text-2xl"></i>
        Study Planner (Coming Soon)
      </button>
    </div>
  </div>

  <script>
    async function checkAuth() {
      try {
        const res = await fetch('/api/me');
        if (!res.ok) {
          window.location.href = '/login.html';
          return;
        }
        const data = await res.json();
        document.getElementById('welcome-name').textContent = `Hi, ${data.name || 'Student'}!`;
      } catch (err) {
        window.location.href = '/login.html';
      }
    }

    function logout() {
      if (!confirm("Are you sure you want to logout?")) return;
      fetch('/api/logout', { method: 'POST' })
        .then(() => window.location.href = '/login.html');
    }

    function goToLive() {
      window.location.href = '/live.html';
    }

    function goToLibrary() {
      window.location.href = '/subjects.html';   // or subjects.html if you prefer
    }

    function openPlanner() {
      window.location.href = 'https://nil-132.github.io/Schedule/';
    }

    // Run when page loads
    window.onload = checkAuth;
  </script>
</body>
</html>
