<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subjects - Project02</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
      font-family: 'Inter', system_ui, sans-serif;
    }
    .subject-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .subject-card:hover {
      transform: translateY(-15px);
      box-shadow: 0 30px 60px -15px rgb(37 99 235 / 0.25);
    }
    .pw-blue {
      color: #2563eb;
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- PW Style Header -->
  <nav class="bg-white border-b-2 border-blue-600 shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">P</div>
        <div>
          <h1 class="text-2xl font-bold text-gray-800">Project02</h1>
          <p class="text-xs text-gray-500 -mt-1">By Alakh Sir Fans</p>
        </div>
      </div>
      <div class="flex items-center gap-6">
        <div class="text-sm text-gray-600 hidden md:block">
          Welcome, <span id="user-name" class="font-semibold text-blue-600"></span>
        </div>
        <button onclick="logout()"
                class="flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-2xl text-sm font-medium transition-all">
          <i class="fa-solid fa-right-from-bracket"></i>
          Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-12">
    <div class="text-center mb-12">
      <h2 class="text-4xl font-bold text-gray-800 mb-3">Choose Your Subject</h2>
      <p class="text-gray-600 text-lg">Learn from the best teachers • Crack your exam with confidence</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="subjects-container"></div>
  </div>

  <script>
    const subjectsList = [
      { id: "quant", name: "Quantitative Aptitude", color: "blue", icon: "📊" },
      { id: "reasoning", name: "Reasoning Ability", color: "purple", icon: "🧠" },
      { id: "english", name: "English Language", color: "pink", icon: "📖" },
      { id: "banking", name: "Banking Awareness", color: "emerald", icon: "🏦" },
      { id: "current", name: "Current Affairs", color: "orange", icon: "📰" }
    ];

    async function renderSubjects() {
      const container = document.getElementById('subjects-container');
      let html = '';
      for (let sub of subjectsList) {
        try {
          const res = await fetch(`/api/lectures?subjectId=${sub.id}`);
          const lectures = await res.json();
          const totalLectures = lectures.length;
          const completedLectures = lectures.filter(l => l.completed === true).length;
          const progress = totalLectures > 0 ? Math.round((completedLectures / totalLectures) * 100) : 0;
          html += `
            <div onclick="openSubject('${sub.id}', '${sub.name}')"
                 class="subject-card bg-white rounded-3xl p-8 border border-gray-100 cursor-pointer hover:border-blue-300">
              <div class="flex justify-between items-start mb-8">
                <div class="text-6xl">${sub.icon}</div>
                <div class="text-right">
                  <div class="text-sm text-gray-500">${totalLectures} Lectures</div>
                  <div class="text-5xl font-bold text-${sub.color}-600 mt-1">${progress}%</div>
                </div>
              </div>
              <h3 class="text-2xl font-bold text-gray-800 mb-2">${sub.name}</h3>
              <p class="text-gray-600 mb-8">Master concepts with high-quality lectures</p>
              <div class="h-2.5 bg-gray-100 rounded-full overflow-hidden">
                <div class="h-full bg-${sub.color}-600 rounded-full transition-all"
                     style="width: ${progress}%"></div>
              </div>
            </div>`;
        } catch (err) {
          html += `
            <div onclick="openSubject('${sub.id}', '${sub.name}')"
                 class="subject-card bg-white rounded-3xl p-8 border border-gray-100 cursor-pointer">
              <div class="text-6xl mb-6">${sub.icon}</div>
              <h3 class="text-2xl font-bold text-gray-800">${sub.name}</h3>
              <p class="text-gray-600 mt-4">Start learning now</p>
            </div>`;
        }
      }
      container.innerHTML = html;
    }

    function openSubject(subjectId, subjectName) {
      window.location.href = `/lectures.html?subjectId=${subjectId}&subjectName=${encodeURIComponent(subjectName)}`;
    }

    // ====================== SECURITY & AUTH ======================
    async function checkAuth() {
      try {
        const res = await fetch('/api/me');
        if (!res.ok) {
          window.location.href = '/login.html';
          return;
        }
        const data = await res.json();
        document.getElementById('user-name').textContent = data.name || 'Student';
      } catch (err) {
        window.location.href = '/login.html';
      }
    }

    async function logout() {
      if (!confirm("Are you sure you want to logout?")) return;
      try {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/login.html';
      } catch (err) {
        alert("Logout failed. Please try again.");
      }
    }

    // Initialize
    window.onload = async () => {
      await checkAuth();
      await renderSubjects();
    };
  </script>
</body>
</html>
