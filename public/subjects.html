<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subjects - My PW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
      font-family: 'Inter', system_ui, sans-serif;
    }
    .subject-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .subject-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 50px -12px rgb(37 99 235 / 0.25);
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <nav class="bg-white border-b-2 border-blue-600 shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">P</div>
        <div>
          <h1 class="text-2xl font-bold text-gray-800">My PW</h1>
          <p class="text-xs text-gray-500 -mt-1">By Alakh Sir Fans</p>
        </div>
      </div>
      <div class="flex items-center gap-6">
        <a href="dashboard.html" class="flex items-center gap-2 text-sm text-gray-600 hover:text-blue-600 transition">
          <i class="fas fa-home"></i>
          <span class="hidden md:inline">Dashboard</span>
        </a>
        <button id="add-subject-btn" onclick="showAddSubjectModal()"
                class="hidden flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-2xl text-sm font-medium">
          <i class="fa-solid fa-plus"></i> Add Subject
        </button>
        <div class="text-sm text-gray-600 hidden md:block">
          Welcome, <span id="user-name" class="font-semibold text-blue-600"></span>
        </div>
        <button onclick="logout()" 
                class="flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-2xl text-sm font-medium transition-all">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-12">
    <div class="text-center mb-12">
      <h2 class="text-4xl font-bold text-gray-800 mb-3">Choose Your Subject</h2>
      <p class="text-gray-600 text-lg">Learn from the best teachers • Crack your exam with confidence</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="subjects-container">
      <!-- Filled by JavaScript -->
    </div>
  </div>

  <!-- Add Subject Modal -->
  <div id="add-subject-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[200]">
    <div class="bg-white rounded-3xl p-8 w-full max-w-md mx-4">
      <h3 class="text-2xl font-semibold mb-6 text-center">Add New Subject</h3>
      <div class="space-y-5">
        <input id="new-subject-name" type="text" placeholder="Subject Name (e.g. General Awareness)" 
               class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
        <input id="new-subject-icon" type="text" placeholder="Icon Emoji (e.g. 🌍)" 
               class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
        <select id="new-subject-color" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
          <option value="#3b82f6">Blue</option>
          <option value="#8b5cf6">Purple</option>
          <option value="#ec4899">Pink</option>
          <option value="#10b981">Emerald</option>
          <option value="#f59e0b">Orange</option>
          <option value="#6366f1">Indigo</option>
        </select>
      </div>
      <div class="flex gap-4 mt-8">
        <button onclick="hideAddSubjectModal()" 
                class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium hover:bg-gray-50">Cancel</button>
        <button onclick="addNewSubject()" 
                class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-semibold hover:bg-blue-700">Add Subject</button>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://final-djbd.onrender.com';
    let currentUser = null;

    async function checkAdmin() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/me`, { credentials: 'include' });
        const data = await res.json();

        if (data.success) {
          currentUser = data.user;
          document.getElementById('user-name').textContent = data.user.name || 'Student';
          if (data.user.role === 'admin') {
            document.getElementById('add-subject-btn').classList.remove('hidden');
          }
          return true;
        } else {
          window.location.href = 'login.html';
          return false;
        }
      } catch (err) {
        console.error(err);
        window.location.href = 'login.html';
        return false;
      }
    }

    async function renderSubjects() {
      const container = document.getElementById('subjects-container');
      container.innerHTML = `
        <div class="col-span-3 text-center py-16">
          <i class="fas fa-spinner fa-spin text-4xl text-blue-600"></i>
          <p class="mt-4 text-gray-500">Loading your subjects...</p>
        </div>`;

      try {
        const res = await fetch(`${BACKEND_URL}/api/subjects`, { credentials: 'include' });
        if (!res.ok) throw new Error('Failed to fetch subjects');

        let subjects = await res.json();
        console.log("✅ Subjects loaded from DB:", subjects);

        if (!subjects || subjects.length === 0) {
          subjects = [
            { _id: "quant", name: "Quantitative Aptitude", icon: "📊", color: "#3b82f6" },
            { _id: "reasoning", name: "Reasoning Ability", icon: "🧠", color: "#8b5cf6" },
            { _id: "english", name: "English Language", icon: "📖", color: "#ec4899" },
            { _id: "banking", name: "Banking Awareness", icon: "🏦", color: "#10b981" },
            { _id: "current", name: "Current Affairs", icon: "📰", color: "#f59e0b" }
          ];
        }

        let html = '';
        for (let sub of subjects) {
          const subjectId = sub._id || sub.id;
          let progress = 0;

          try {
            const lecRes = await fetch(`\( {BACKEND_URL}/api/lectures?subjectId= \){subjectId}`, { credentials: 'include' });
            if (lecRes.ok) {
              const lectures = await lecRes.json();
              const total = lectures.length;
              const completed = lectures.filter(l => l.completed).length;
              progress = total > 0 ? Math.round((completed / total) * 100) : 0;
            }
          } catch (e) {
            console.log("Progress fetch skipped for", sub.name);
          }

          html += `
            <div onclick="goToLectures('${subjectId}')" 
                 class="subject-card bg-white rounded-3xl p-8 border border-gray-100 cursor-pointer">
              <div class="flex justify-between items-start">
                <div class="text-6xl mb-6">${sub.icon || '📚'}</div>
                <div class="text-right">
                  <div class="text-xs font-medium text-gray-400">PROGRESS</div>
                  <div class="text-3xl font-bold text-blue-600">${progress}%</div>
                </div>
              </div>
              <h3 class="text-2xl font-semibold text-gray-800 mb-2">${sub.name}</h3>
              <p class="text-gray-500 text-sm">Click to view chapters & lectures</p>
              <div class="mt-6 h-2 bg-gray-100 rounded-full overflow-hidden">
                <div class="h-full bg-blue-600 rounded-full transition-all" style="width: ${progress}%"></div>
              </div>
            </div>`;
        }

        container.innerHTML = html || '<p class="col-span-3 text-center py-12 text-gray-500">No subjects available yet.</p>';
      } catch (error) {
        console.error("Error loading subjects:", error);
        container.innerHTML = `
          <div class="col-span-3 text-center py-12">
            <p class="text-red-500">Failed to load subjects from server.</p>
            <p class="text-sm text-gray-500 mt-2">Make sure you are logged in.</p>
          </div>`;
      }
    }

    function goToLectures(subjectId) {
      window.location.href = `lectures.html?subjectId=${subjectId}`;
    }

    function showAddSubjectModal() {
      document.getElementById('add-subject-modal').classList.remove('hidden');
      document.getElementById('add-subject-modal').classList.add('flex');
    }

    function hideAddSubjectModal() {
      const modal = document.getElementById('add-subject-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    async function addNewSubject() {
      const name = document.getElementById('new-subject-name').value.trim();
      const icon = document.getElementById('new-subject-icon').value.trim();
      const color = document.getElementById('new-subject-color').value;

      if (!name) {
        alert("Subject name is required!");
        return;
      }

      try {
        const res = await fetch(`${BACKEND_URL}/api/subjects`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ name, icon, color })
        });

        if (res.ok) {
          alert('Subject added successfully!');
          hideAddSubjectModal();
          renderSubjects();
        } else {
          const data = await res.json();
          alert(data.message || 'Only admins can add subjects');
        }
      } catch (err) {
        console.error(err);
        alert('Something went wrong');
      }
    }

    function logout() {
      fetch(`${BACKEND_URL}/api/logout`, { 
        method: 'POST',
        credentials: 'include' 
      }).then(() => {
        window.location.href = 'login.html';
      });
    }

    // Auto start when page loads
    document.addEventListener('DOMContentLoaded', async () => {
      const isLoggedIn = await checkAdmin();
      if (isLoggedIn) renderSubjects();
    });
  </script>
</body>
</html>
